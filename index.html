
<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#111827">
<title>가격검색</title>
<style>
:root{
  --bg:#f3f4f6;--card:#fff;--line:#e5e7eb;--text:#111827;--muted:#6b7280;
  --blue:#2563eb;--red:#dc2626;--green:#16a34a;--amber:#d97706;--dark:#111827;--teal:#0f766e;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  margin:0;background:var(--bg);font-family:Arial,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;color:var(--text);
  padding-bottom:72px;
}
.top{
  position:sticky;top:0;background:rgba(243,244,246,.97);backdrop-filter:blur(10px);
  z-index:10;padding:10px 10px 8px;border-bottom:1px solid var(--line);
}
.wrap{max-width:760px;margin:0 auto}
.headerRow{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:6px}
h1{font-size:22px;margin:0;font-weight:900}
.status{font-size:12px;color:var(--muted);line-height:1.45;margin-bottom:8px;word-break:keep-all}
.searchRow{display:grid;grid-template-columns:1fr 76px;gap:7px;margin-bottom:7px}
#q{
  width:100%;border:2px solid #d1d5db;border-radius:16px;padding:14px 14px;font-size:18px;outline:none;background:white;
}
#q:focus{border-color:var(--blue)}
button{
  border:0;border-radius:16px;padding:0 12px;background:var(--dark);color:#fff;font-weight:900;font-size:14px;
  min-height:48px;cursor:pointer;
}
button:disabled{opacity:.55}
#syncBtn{background:var(--teal);min-height:38px;border-radius:999px;font-size:12px;padding:0 10px}
.quickRow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:7px}
.quickBtn{background:#fff;color:#111827;border:1px solid var(--line);font-size:13px;min-height:42px}
.quickBtn.active{background:#111827;color:#fff;border-color:#111827}
.filterPanel{
  background:#fff;border:1px solid var(--line);border-radius:18px;padding:10px;margin-top:6px;display:none;
}
.filterPanel.show{display:block}
.dateFilters{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.dateFilters label{font-size:12px;color:var(--muted);font-weight:800;display:block;margin-bottom:4px}
.dateFilters input,.boxSearch input{
  width:100%;border:1px solid #d1d5db;border-radius:14px;padding:12px;font-size:16px;background:#fff;outline:none;
}
.boxSearch{display:grid;grid-template-columns:1fr 84px;gap:8px;margin-top:8px}
.filters{display:flex;gap:7px;overflow:auto;padding:8px 0 0;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.chip{
  border:1px solid var(--line);background:#fff;color:#374151;border-radius:999px;padding:9px 12px;font-size:13px;
  white-space:nowrap;cursor:pointer;font-weight:800;
}
.chip.active{background:#111827;color:#fff;border-color:#111827}
.content{max-width:760px;margin:0 auto;padding:10px}
.count{font-size:13px;color:#374151;margin:4px 2px 10px}
.card{
  background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px;margin-bottom:10px;
  box-shadow:0 1px 2px rgba(0,0,0,.04);
}
.name{font-size:18px;font-weight:900;line-height:1.35;margin-bottom:8px}
.badges{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.badge{display:inline-flex;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:900;background:#eff6ff;color:#1d4ed8}
.price{background:#fee2e2;color:#b91c1c}.good{background:#dcfce7;color:#166534}.warn{background:#fef3c7;color:#92400e}.risk{background:#fee2e2;color:#b91c1c}.gray{background:#f3f4f6;color:#374151}
.meta{font-size:13px;color:#4b5563;line-height:1.65}.expiryEdit{display:grid;grid-template-columns:1fr 72px;gap:6px;margin-top:8px}.expiryEdit input{border:1px solid #d1d5db;border-radius:12px;padding:9px;font-size:13px}.expiryEdit button{min-height:36px;border-radius:12px;font-size:12px;background:#0f766e}.exceptionBtns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:10px}.exceptionBtns button{min-height:38px;border-radius:12px;font-size:12px;padding:0 6px}.btnManu{background:#f59e0b}.btnExclude{background:#6b7280}.btnExpiry{background:#2563eb}
.metaGrid{display:grid;grid-template-columns:1fr 1fr;gap:4px 8px}
.empty{background:#fff;border:1px dashed #d1d5db;border-radius:18px;padding:22px;color:#6b7280;line-height:1.7}
.highlight{background:#fff3a3;border-radius:4px}
.bottomBar{
  position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.97);border-top:1px solid var(--line);
  padding:8px 10px calc(8px + env(safe-area-inset-bottom));z-index:20;
}
.bottomInner{max-width:760px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.bottomInner button{min-height:48px;font-size:13px}
.btnLight{background:#f3f4f6;color:#111827;border:1px solid var(--line)}
.btnPrimary{background:#111827;color:#fff}
.btnGreen{background:#0f766e;color:#fff}
.small{font-size:12px;color:var(--muted)}
@media(max-width:430px){
  h1{font-size:21px}
  .top{padding-left:8px;padding-right:8px}
  .content{padding:8px}
  .searchRow{grid-template-columns:1fr 68px}
  #q{font-size:17px;padding:13px}
  .metaGrid{grid-template-columns:1fr}
  .card{border-radius:17px;padding:13px}
  .name{font-size:17px}
}
</style>
</head>
<body>
<div class="top">
  <div class="wrap">
    <div class="headerRow">
      <h1>🔎 가격검색</h1>
      <button id="syncBtn" onclick="syncData()">동기화</button>
    </div>
    <div id="status" class="status">데이터 불러오는 중...</div>

    <div class="searchRow">
      <input id="q" type="search" placeholder="상품명 / 잡화 29 / 바코드" autocomplete="off">
      <button onclick="clearSearch()">초기화</button>
    </div>

    <div class="quickRow">
      <button class="quickBtn" id="todayBtn" onclick="setQuickDate('today')">오늘</button>
      <button class="quickBtn" id="yesterdayBtn" onclick="setQuickDate('yesterday')">어제</button>
      <button class="quickBtn" id="recentBtn" onclick="setQuickDate('recent7')">최근7일</button>
    </div>

    <div class="filterPanel" id="filterPanel">
      <div class="dateFilters">
        <div>
          <label>시작 입고일</label>
          <input id="dateStart" type="date">
        </div>
        <div>
          <label>종료 입고일</label>
          <input id="dateEnd" type="date">
        </div>
      </div>
      <div class="boxSearch">
        <input id="boxNoInput" type="number" inputmode="numeric" placeholder="박스번호 예: 7">
        <button onclick="searchBox()">박스검색</button>
      </div>
    </div>

    <div class="filters">
      <span class="chip active" data-menu="전체상품">전체</span>
      <span class="chip" data-menu="유통기한관리">유통기한</span>
      <span class="chip" data-menu="만료">만료</span>
      <span class="chip" data-menu="7일이내">7일</span>
      <span class="chip" data-menu="30일이내">30일</span>
      <span class="chip" data-menu="60일이내">60일</span>
      <span class="chip" data-menu="장기재고">장기</span>
      <span class="chip" data-menu="기한확인필요">기한확인</span>
      <span class="chip" data-menu="비관리대상">비관리</span>
    </div>
  </div>
</div>

<div class="content">
  <div id="count" class="count"></div>
  <div id="results"></div>
</div>

<div class="bottomBar">
  <div class="bottomInner">
    <button class="btnLight" onclick="toggleFilter()">날짜/박스</button>
    <button class="btnPrimary" onclick="focusSearch()">검색</button>
    <button class="btnGreen" onclick="syncData()">동기화</button>
  </div>
</div>

<script>
let DATA=[], META={}, currentMenu="전체상품";

function pad(n){return String(n).padStart(2,"0")}
function formatDate(d){return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`}
function todayStr(){return formatDate(new Date())}
function yesterdayStr(){const d=new Date();d.setDate(d.getDate()-1);return formatDate(d)}
function recent7Start(){const d=new Date();d.setDate(d.getDate()-6);return formatDate(d)}
function won(n){return (!n||isNaN(n))?"":Number(n).toLocaleString()+"원"}
function escapeHtml(s){return String(s??"").replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function normalize(s){return String(s??"").toLowerCase().replaceAll(",",".").trim()}
function highlight(text,query){
  let safe=escapeHtml(text);
  const tokens=normalize(query).split(/\s+/).filter(Boolean);
  for(const t of tokens){
    const e=t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    safe=safe.replace(new RegExp(`(${e})`,"ig"),'<span class="highlight">$1</span>');
  }
  return safe;
}
function badgeClass(item){
  if(item.manage==="기한확인필요")return"warn";
  if(item.manage==="비관리대상")return"gray";
  if(item.section==="만료")return"risk";
  if(item.section==="7일이내"||item.section==="30일이내")return"warn";
  return"good";
}
function passMenu(item){
  if(currentMenu==="전체상품")return true;
  if(currentMenu==="유통기한관리")return item.manage==="유통기한관리";
  if(currentMenu==="기한확인필요")return item.manage==="기한확인필요";
  if(currentMenu==="비관리대상")return item.manage==="비관리대상";
  return item.section===currentMenu;
}
function setActiveQuick(id){
  ["todayBtn","yesterdayBtn","recentBtn"].forEach(x=>document.getElementById(x).classList.remove("active"));
  if(id) document.getElementById(id).classList.add("active");
}
function setQuickDate(type){
  const s=document.getElementById("dateStart"), e=document.getElementById("dateEnd");
  if(type==="today"){s.value=todayStr();e.value=todayStr();setActiveQuick("todayBtn");}
  if(type==="yesterday"){s.value=yesterdayStr();e.value=yesterdayStr();setActiveQuick("yesterdayBtn");}
  if(type==="recent7"){s.value=recent7Start();e.value=todayStr();setActiveQuick("recentBtn");}
  document.getElementById("filterPanel").classList.add("show");
  search();
}
function toggleFilter(){document.getElementById("filterPanel").classList.toggle("show")}
function focusSearch(){document.getElementById("q").focus()}
function clearSearch(){document.getElementById("q").value="";search();focusSearch()}
function searchBox(){
  document.getElementById("filterPanel").classList.add("show");
  search();
}
function search(){
  const q=normalize(document.getElementById("q").value);
  const tokens=q.split(/\s+/).filter(Boolean);
  const start=document.getElementById("dateStart").value;
  const end=document.getElementById("dateEnd").value;
  const boxNo=String(document.getElementById("boxNoInput").value||"").trim();

  let rows=DATA.filter(passMenu);
  if(start) rows=rows.filter(item=>(item.inboundDate||"")>=start);
  if(end) rows=rows.filter(item=>(item.inboundDate||"")<=end);
  if(boxNo) rows=rows.filter(item=>String(item.boxNo||"").trim()===boxNo);

  if(tokens.length) rows=rows.filter(item=>tokens.every(t=>normalize(item.search).includes(t)));
  else if(!boxNo && !start && !end) rows=rows.slice(0,80);

  render(rows,q,boxNo,start,end);
}
function render(rows,q,boxNo,start,end){
  const results=document.getElementById("results");
  let extra="";
  if(start||end) extra+=` · 날짜 ${escapeHtml(start||"")}~${escapeHtml(end||"")}`;
  if(boxNo) extra+=` · 박스 ${escapeHtml(boxNo)}`;
  document.getElementById("count").innerHTML=`검색 결과 <b>${rows.length.toLocaleString()}</b>건${extra}`+(rows.length>150?" · 상위 150건 표시":"");

  if(!rows.length){
    results.innerHTML=`<div class="empty">검색 결과가 없습니다.<br>날짜와 박스번호를 확인해 주세요.<br>예: 어제 → 박스번호 7</div>`;
    return;
  }
  results.innerHTML=rows.slice(0,150).map(item=>{
    const priceText=item.price?won(item.price):(item.priceBand?item.priceBand:"가격정보 없음");
    const days=(item.daysLeft===""||item.daysLeft==null)?"":`${item.daysLeft}일`;
    return `<div class="card">
      <div class="name">${highlight(item.product,q)}</div>
      <div class="badges">
        <span class="badge">${escapeHtml(item.category||"분류없음")}</span>
        <span class="badge">${escapeHtml(item.type||"형태없음")}</span>
        <span class="badge price">${escapeHtml(priceText)}</span>
        <span class="badge ${badgeClass(item)}">${escapeHtml(item.manage||"")}</span>
        ${item.section?`<span class="badge ${badgeClass(item)}">${escapeHtml(item.section)}</span>`:""}${item.exceptionMode?`<span class="badge warn">${item.exceptionMode==="expiry_override"?"유통기한수정":`예외:${escapeHtml(item.exceptionMode)}`}</span>`:""}
      </div>
      <div class="meta metaGrid">
        <div>입고일: <b>${escapeHtml(item.inboundDate||"-")}</b></div>
        <div>매장: <b>${escapeHtml(item.store||"-")}</b></div><div>박스번호: <b>${escapeHtml(item.boxNo||"-")}</b></div>
        <div>유통기한: <b>${escapeHtml(item.expiryDate||"-")}</b> ${days?`(${escapeHtml(days)})`:""}</div>
        <div>바코드: ${escapeHtml(item.barcode||"-")}</div>
        <div>비고: ${escapeHtml(item.note||"-")}</div>
        <div>시트/행: ${escapeHtml(item.sheet||"-")} / ${escapeHtml(item.row||"-")}</div>
      </div>
      <div class="expiryEdit">
        <input type="date" id="expiry-${item.row}" value="${escapeHtml(item.expiryDate || '')}">
        <button onclick="saveItemExpiry('${encodeURIComponent(item.itemKey)}','expiry-${item.row}')">저장</button>
      </div>
      <div class="exceptionBtns">
        <button class="btnManu" onclick="setItemException('${encodeURIComponent(item.itemKey)}','manufacture')">제조일</button>
        <button class="btnExclude" onclick="setItemException('${encodeURIComponent(item.itemKey)}','exclude')">관리제외</button>
        <button class="btnExpiry" onclick="setItemException('${encodeURIComponent(item.itemKey)}','expiry')">유통기한</button>
      </div>
    </div>`;
  }).join("");
}


async function saveItemExpiry(itemKeyEncoded, inputId){
  const value = document.getElementById(inputId).value;
  if(!value){
    alert("유통기한을 선택해 주세요.");
    return;
  }
  if(!confirm(`유통기한을 ${value}로 저장할까요?`)) return;

  try{
    const r = await fetch(`/set_item_expiry/${itemKeyEncoded}/${value}?ts=`+Date.now());
    const res = await r.json();
    if(!res.ok){ alert("저장 실패: "+res.message); return; }
    alert("유통기한 저장 완료");
    await loadData();
  }catch(e){
    alert("저장 실패: "+e);
  }
}


async function setItemException(itemKeyEncoded, mode){
  const label = mode==="manufacture" ? "제조일 상품" : (mode==="exclude" ? "기한관리 제외" : "유통기한 상품");
  if(!confirm(`이 행을 [${label}]으로 설정할까요?\\n같은 상품이라도 매장/입고일/박스가 다르면 따로 저장됩니다.`)) return;
  try{
    const r = await fetch(`/set_item_exception/${itemKeyEncoded}/${mode}?ts=`+Date.now());
    const res = await r.json();
    if(!res.ok){ alert("설정 실패: "+res.message); return; }
    alert("설정 저장 완료");
    await loadData();
  }catch(e){
    alert("설정 실패: "+e);
  }
}

async function setException(productEncoded, mode){
  const label = mode==="manufacture" ? "제조일 상품" : (mode==="exclude" ? "기한관리 제외" : "유통기한 상품");
  if(!confirm(`이 상품을 [${label}]으로 설정할까요?`)) return;
  try{
    const r = await fetch(`/set_exception/${productEncoded}/${mode}?ts=`+Date.now());
    const res = await r.json();
    if(!res.ok){ alert("설정 실패: "+res.message); return; }
    alert("설정 저장 완료");
    await loadData();
  }catch(e){
    alert("설정 실패: "+e);
  }
}

async function loadData(){
  try{
    const r=await fetch("search_data.json?ts="+Date.now());
    const data=await r.json();
    META=data; DATA=data.items||[];
    document.getElementById("status").innerHTML=`업데이트: <b>${escapeHtml(data.updatedAt||"-")}</b> · 상품 <b>${(data.count||DATA.length).toLocaleString()}</b>개 · 10분마다 자동 확인`;
    search();
  }catch(err){
    document.getElementById("status").innerHTML="데이터 없음. 동기화를 눌러주세요.";
    document.getElementById("results").innerHTML=`<div class="empty">데이터 파일이 없습니다.<br>동기화 버튼을 눌러 가격리스트를 불러오세요.</div>`;
  }
}
async function syncData(){
  const btns=[...document.querySelectorAll("button")].filter(b=>b.innerText.includes("동기화"));
  btns.forEach(b=>{b.disabled=true;b.innerText="동기화중"});
  document.getElementById("status").innerHTML="가격리스트 동기화 중...";
  try{
    const r=await fetch("/sync?ts="+Date.now());
    const res=await r.json();
    if(!res.ok) alert("동기화 실패: "+res.message);
    await loadData();
  }catch(e){
    alert("동기화 실패: "+e);
  }finally{
    btns.forEach(b=>{b.disabled=false;b.innerText="동기화"});
  }
}
document.querySelectorAll(".chip").forEach(chip=>{
  chip.addEventListener("click",()=>{
    document.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"));
    chip.classList.add("active");
    currentMenu=chip.dataset.menu;
    search();
  });
});
document.getElementById("q").addEventListener("input",search);
document.getElementById("dateStart").addEventListener("change",()=>{setActiveQuick(null);search();});
document.getElementById("dateEnd").addEventListener("change",()=>{setActiveQuick(null);search();});
document.getElementById("boxNoInput").addEventListener("input",search);
document.getElementById("boxNoInput").addEventListener("keydown",e=>{if(e.key==="Enter"){searchBox();}});
loadData();
</script>
</body>
</html>
